<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中际旭创 300308.SZ — 交互式技术指标工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--text:#e0e0e0;--sub:#8892b0;--red:#e74c3c;--green:#27ae60;--accent:#64ffda;--border:#233554;--input-bg:#0a192f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#0a192f,#112240);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.header h1{font-size:18px;color:var(--accent)}
.header .info{font-size:12px;color:var(--sub)}
.header .badge{background:var(--accent);color:#0a192f;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:8px}
.layout{display:flex;height:calc(100vh - 57px)}
.sidebar{width:280px;min-width:280px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:16px}
.sidebar h3{font-size:13px;color:var(--accent);margin-bottom:12px;letter-spacing:1px;text-transform:uppercase}
.panel{margin-bottom:18px;padding:12px;background:rgba(10,25,47,0.5);border-radius:8px;border:1px solid var(--border)}
.panel label{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--sub);margin-bottom:4px}
.panel label .val{color:var(--accent);font-weight:600;font-size:13px}
.panel input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:4px;outline:none;margin:6px 0}
.panel input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;border:2px solid #0a192f}
.panel input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.1)}
.panel select{width:100%;padding:4px 8px;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;margin-top:4px}
.btn{width:100%;padding:10px;background:var(--accent);color:#0a192f;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;transition:all .2s;margin-top:8px}
.btn:hover{opacity:0.85}
.btn.reset{background:transparent;border:1px solid var(--border);color:var(--sub);margin-top:4px}
.charts-area{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:4px;padding:4px;overflow:hidden}
.chart-box{background:var(--card);border-radius:6px;position:relative}
.chart-box.full{grid-column:1/-1}
.footer{text-align:center;padding:8px;font-size:11px;color:var(--sub);background:var(--card);border-top:1px solid var(--border)}
.pop{position:absolute;top:8px;right:8px;font-size:10px;color:var(--accent);background:rgba(100,255,218,0.1);padding:2px 6px;border-radius:4px;z-index:10}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>中际旭创 <span style="font-size:13px;font-weight:400;color:var(--sub);">300308.SZ · 前复权</span><span class="badge">LIVE</span></h1>
    <div class="info">数据区间: 2025-07-04 ~ 2026-07-03 · 242 交易日 · 数据来源: Tushare Pro</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <h3>参数控制台</h3>

    <div class="panel">
      <label>RSI 周期 <span class="val" id="rsi-val">14</span></label>
      <input type="range" id="rsi-per" min="2" max="50" value="14" oninput="updateVal('rsi')">
    </div>

    <div class="panel">
      <label>MACD 快线 <span class="val" id="macd-fast-val">12</span></label>
      <input type="range" id="macd-fast" min="2" max="50" value="12" oninput="updateVal('macd-fast')">
      <label>MACD 慢线 <span class="val" id="macd-slow-val">26</span></label>
      <input type="range" id="macd-slow" min="5" max="100" value="26" oninput="updateVal('macd-slow')">
      <label>MACD 信号 <span class="val" id="macd-sig-val">9</span></label>
      <input type="range" id="macd-sig" min="2" max="30" value="9" oninput="updateVal('macd-sig')">
    </div>

    <div class="panel">
      <label>布林带周期 <span class="val" id="bb-per-val">20</span></label>
      <input type="range" id="bb-per" min="5" max="60" value="20" oninput="updateVal('bb-per')">
      <label>布林带标准差 <span class="val" id="bb-std-val">2.0</span></label>
      <input type="range" id="bb-std" min="0.5" max="4.0" step="0.1" value="2.0" oninput="updateVal('bb-std')">
    </div>

    <div class="panel">
      <label>ATR 周期 <span class="val" id="atr-per-val">14</span></label>
      <input type="range" id="atr-per" min="2" max="50" value="14" oninput="updateVal('atr-per')">
    </div>

    <button class="btn" onclick="redrawAll()">应用参数 & 重绘</button>
    <button class="btn reset" onclick="resetParams()">恢复默认参数</button>

    <div style="margin-top:16px;font-size:11px;color:var(--sub);text-align:center;">
      拖动滑块 → 点"应用参数"<br>即时重绘所有图表
    </div>
  </div>

  <div class="charts-area">
    <div class="chart-box" id="chart-bb"><div class="pop">布林带</div></div>
    <div class="chart-box" id="chart-rsi"><div class="pop">RSI</div></div>
    <div class="chart-box" id="chart-macd"><div class="pop">MACD</div></div>
    <div class="chart-box" id="chart-atr"><div class="pop">ATR</div></div>
  </div>
</div>
<div class="footer">前复权数据 · 技术指标实时计算 · 不构成投资建议</div>

// ===== 技术指标计算 (JS原生) =====
function ema(data, n) {
  var k = 2/(n+1), out = new Array(data.length);
  out[0] = data[0];
  for (var i = 1; i < data.length; i++) out[i] = data[i]*k + out[i-1]*(1-k);
  return out;
}

function sma(data, n) {
  var out = new Array(data.length);
  for (var i = 0; i < data.length; i++) {
    if (i < n-1) out[i] = null;
    else { var sum = 0; for (var j = i-n+1; j <= i; j++) sum += data[j]; out[i] = sum/n; }
  }
  return out;
}

function wilderSmooth(data, n) {
  var out = new Array(data.length);
  for (var i = 0; i < data.length; i++) {
    if (i < n) out[i] = null;
    else if (i === n) { var sum = 0; for (var j = 1; j <= n; j++) sum += data[j]; out[i] = sum/n; }
    else out[i] = (out[i-1]*(n-1) + data[i]) / n;
  }
  return out;
}

function computeRSI(close, n) {
  var gain = new Array(close.length).fill(0), loss = new Array(close.length).fill(0);
  for (var i = 1; i < close.length; i++) {
    var d = close[i]-close[i-1];
    gain[i] = d > 0 ? d : 0; loss[i] = d < 0 ? -d : 0;
  }
  var avgG = wilderSmooth(gain, n), avgL = wilderSmooth(loss, n);
  var rsi = new Array(close.length);
  for (var i = 0; i < close.length; i++) {
    if (avgG[i]==null||avgL[i]==null) rsi[i]=null;
    else { var rs = avgL[i]==0 ? 999 : avgG[i]/avgL[i]; rsi[i] = 100-100/(1+rs); }
  }
  return rsi;
}

function computeMACD(close, fast, slow, sig) {
  var emaF = ema(close, fast), emaS = ema(close, slow);
  var dif = new Array(close.length), dea, macd;
  for (var i = 0; i < close.length; i++) dif[i] = emaF[i]-emaS[i];
  dea = ema(dif, sig);
  macd = new Array(close.length);
  for (var i = 0; i < close.length; i++) macd[i] = (dif[i]-dea[i])*2;
  return {dif:dif,dea:dea,macd:macd};
}

function computeBB(close, n, k) {
  var mid = sma(close, n);
  var upper = new Array(close.length), lower = new Array(close.length);
  for (var i = 0; i < close.length; i++) {
    if (mid[i]==null) { upper[i]=null; lower[i]=null; continue; }
    var sum = 0; for (var j=i-n+1; j<=i; j++) sum += Math.pow(close[j]-mid[i],2);
    var std = Math.sqrt(sum/n);
    upper[i] = mid[i]+k*std; lower[i] = mid[i]-k*std;
  }
  return {mid:mid,upper:upper,lower:lower};
}

function computeATR(O,H,L,C,n) {
  var tr = new Array(H.length);
  tr[0] = H[0]-L[0];
  for (var i = 1; i < H.length; i++) tr[i] = Math.max(H[i]-L[i], Math.abs(H[i]-C[i-1]), Math.abs(L[i]-C[i-1]));
  return wilderSmooth(tr, n);
}
